apiVersion: v1
kind: Secret
metadata:
  name: senanalytics-secrets
  namespace: senanalytics
type: Opaque
stringData:
  DATABASE_URL: "postgresql://senanalytics:${DB_PASSWORD}@postgres.senanalytics.svc.cluster.local:5432/senanalytics"
  NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
  LLM_API_KEY: "${LLM_API_KEY}"
  # These are replaced at deploy time via envsubst or Kustomize/Helm.
  # DO NOT commit real values.
