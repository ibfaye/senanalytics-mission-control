apiVersion: v1
kind: ConfigMap
metadata:
  name: senanalytics-config
  namespace: senanalytics
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  BACKEND_URL: "http://backend.senanalytics.svc.cluster.local:8000"
  FRONTEND_URL: "https://mission-control.senanalytics.com"
  DATABASE_URL: "postgresql://senanalytics:***@postgres.senanalytics.svc.cluster.local:5432/senanalytics"
  NEO4J_URI: "bolt://neo4j.senanalytics.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  REDIS_URL: "redis://redis.senanalytics.svc.cluster.local:6379"
  FRONTEND_ORIGIN: "https://mission-control.senanalytics.com"
  LLM_BASE_URL: "https://api.openai.com/v1"
  LLM_MODEL: "gpt-4o-mini"
  LLM_TEMPERATURE: "0.3"
  USE_LANGGRAPH: "false"
